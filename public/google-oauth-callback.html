<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Google Sign-In</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #333; }
  </style>
</head>
<body>
  <p id="status">Redirecting to Google&hellip;</p>
  <script>
    (function () {
      var CHANNEL_NAME = 'pondpilot-google-oauth';
      var statusEl = document.getElementById('status');

      // Check if this is the OAuth callback (hash contains access_token)
      var hash = window.location.hash.substring(1);
      var hashParams = new URLSearchParams(hash);
      var accessToken = hashParams.get('access_token');
      if (hash) {
        // Remove credentials/errors from browser history as soon as they have
        // been parsed. OAuth fragment values are never sent to the server.
        window.history.replaceState(null, document.title, window.location.pathname);
      }

      if (accessToken) {
        var expiresIn = Number(hashParams.get('expires_in'));
        var scope = hashParams.get('scope') || '';
        var requiredScope = 'https://www.googleapis.com/auth/spreadsheets.readonly';
        if (!Number.isFinite(expiresIn) || expiresIn <= 0 || scope.split(/\s+/).indexOf(requiredScope) === -1) {
          statusEl.textContent = 'Sign-in returned an invalid authorization response.';
          var invalidBc = new BroadcastChannel(CHANNEL_NAME);
          invalidBc.postMessage({
            type: 'google-oauth-error',
            state: hashParams.get('state') || '',
            error: 'invalid_response',
          });
          invalidBc.close();
          setTimeout(function () { window.close(); }, 250);
          return;
        }

        // Callback from Google — send token to opener via BroadcastChannel
        statusEl.textContent = 'Sign-in complete. This window will close.';
        var bc = new BroadcastChannel(CHANNEL_NAME);
        bc.postMessage({
          type: 'google-oauth-result',
          state: hashParams.get('state') || '',
          accessToken: accessToken,
          expiresIn: expiresIn,
          scope: scope,
        });
        bc.close();
        setTimeout(function () { window.close(); }, 250);
        return;
      }

      // Check for error response from Google
      var error = hashParams.get('error');
      if (error) {
        statusEl.textContent = 'Sign-in failed: ' + error;
        var bc2 = new BroadcastChannel(CHANNEL_NAME);
        var query = new URLSearchParams(window.location.search);
        bc2.postMessage({
          type: 'google-oauth-error',
          state: query.get('state') || hashParams.get('state') || '',
          error: error,
        });
        bc2.close();
        setTimeout(function () { window.close(); }, 2000);
        return;
      }

      // Initial load — redirect to Google OAuth
      var initialQuery = new URLSearchParams(window.location.search);
      var clientId = initialQuery.get('client_id');
      var scope = initialQuery.get('scope');
      var state = initialQuery.get('state');

      if (!clientId || !scope || !state) {
        statusEl.textContent = 'Missing OAuth parameters.';
        return;
      }

      var redirectUri = window.location.origin + window.location.pathname;
      var authUrl = 'https://accounts.google.com/o/oauth2/v2/auth'
        + '?client_id=' + encodeURIComponent(clientId)
        + '&redirect_uri=' + encodeURIComponent(redirectUri)
        + '&response_type=token'
        + '&scope=' + encodeURIComponent(scope)
        + '&state=' + encodeURIComponent(state)
        + '&include_granted_scopes=true';

      // Tell the opener before leaving the same-origin browsing context. With
      // COOP: same-origin, the opener's WindowProxy can look closed as soon as
      // this page reaches Google even though the popup remains open.
      var redirectBc = new BroadcastChannel(CHANNEL_NAME);
      var redirectStarted = false;
      var redirectFallbackTimer;
      var redirectToGoogle = function () {
        if (redirectStarted) return;
        redirectStarted = true;
        clearTimeout(redirectFallbackTimer);
        redirectBc.close();
        window.location.replace(authUrl);
      };

      redirectBc.onmessage = function (event) {
        var data = event.data;
        if (
          data &&
          data.type === 'google-oauth-redirect-approved' &&
          data.state === state
        ) {
          redirectToGoogle();
        }
      };
      redirectBc.postMessage({
        type: 'google-oauth-redirecting',
        state: state,
      });

      // The opener normally acknowledges immediately. Avoid leaving a stranded
      // relay page if the channel is unavailable for an unexpected reason.
      redirectFallbackTimer = setTimeout(redirectToGoogle, 1000);
    })();
  </script>
</body>
</html>
