<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Google Sign-In</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #333; }
  </style>
</head>
<body>
  <p id="status">Redirecting to Google&hellip;</p>
  <script>
    (function () {
      var CHANNEL_NAME = 'pondpilot-google-oauth';
      var statusEl = document.getElementById('status');

      // Check if this is the OAuth callback (hash contains access_token)
      var hash = window.location.hash.substring(1);
      var hashParams = new URLSearchParams(hash);
      var accessToken = hashParams.get('access_token');

      if (accessToken) {
        // Callback from Google — send token to opener via BroadcastChannel
        statusEl.textContent = 'Sign-in complete. This window will close.';
        var bc = new BroadcastChannel(CHANNEL_NAME);
        bc.postMessage({
          type: 'google-oauth-result',
          state: hashParams.get('state') || '',
          accessToken: accessToken,
          expiresIn: parseInt(hashParams.get('expires_in') || '3600', 10),
          scope: hashParams.get('scope') || '',
        });
        bc.close();
        window.close();
        return;
      }

      // Check for error response from Google
      var error = hashParams.get('error');
      if (error) {
        statusEl.textContent = 'Sign-in failed: ' + error;
        var bc2 = new BroadcastChannel(CHANNEL_NAME);
        var query = new URLSearchParams(window.location.search);
        bc2.postMessage({
          type: 'google-oauth-error',
          state: query.get('state') || hashParams.get('state') || '',
          error: error,
        });
        bc2.close();
        setTimeout(function () { window.close(); }, 2000);
        return;
      }

      // Initial load — redirect to Google OAuth
      var query = new URLSearchParams(window.location.search);
      var clientId = query.get('client_id');
      var scope = query.get('scope');
      var state = query.get('state');

      if (!clientId || !scope || !state) {
        statusEl.textContent = 'Missing OAuth parameters.';
        return;
      }

      var redirectUri = window.location.origin + window.location.pathname;
      var authUrl = 'https://accounts.google.com/o/oauth2/v2/auth'
        + '?client_id=' + encodeURIComponent(clientId)
        + '&redirect_uri=' + encodeURIComponent(redirectUri)
        + '&response_type=token'
        + '&scope=' + encodeURIComponent(scope)
        + '&state=' + encodeURIComponent(state)
        + '&include_granted_scopes=true';

      window.location.href = authUrl;
    })();
  </script>
</body>
</html>
